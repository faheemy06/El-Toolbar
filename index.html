<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Apex Toolbar</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <link rel="stylesheet" href="style.css" type="text/css" />
</head>
<body>

  <div id="toolbar">
    <div id="drag-handle">
      <span></span><span></span>
      <span></span><span></span>
      <span></span><span></span>
    </div>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-format" title="Currency Style (£)">£</button>
    <button class="tool-btn" id="btn-sum"    title="Smart AutoSum (Auto-Detect Direction)">∑</button>
    <button class="tool-btn" id="btn-audit"  title="Audit X-Ray: Blue=Formula, Orange=Value">⋈</button>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-vat"    title="Add 20% VAT (Next Cell)">VAT</button>
    <button class="tool-btn" id="btn-delta"  title="Variance Δ% (Auto-Detect Direction)">Δ%</button>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-freeze" title="Freeze Header Row">❄</button>
    <button class="tool-btn" id="btn-clean"  title="Clear Formatting & Fills">⌫</button>
    <button class="tool-btn" id="btn-unfreeze" title="Unlock Screen">□</button>
  </div>

  <script src="app.js" type="text/javascript"></script>
</body>
</html>
